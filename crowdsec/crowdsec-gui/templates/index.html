<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdSec Panel | open-appsec</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Tailwind for rapid prototyping layout properties we didn't cover in CSS -->
</head>
<body>
    
    <div class="container">
        <div class="header">
            <h1>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                <span>CrowdSec</span> Security Panel
            </h1>
            
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search IP address or reason...">
            </div>
        </div>

        <div class="card">
            <table id="decisionsTable">
                <thead>
                    <tr>
                        <th>IP Address</th>
                        <th>Duration Left</th>
                        <th>Ban Scenario (Reason)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% if banned_ips %}
                        {% for item in banned_ips %}
                        <tr class="item-row" id="row-{{ item.ip | replace('.', '-') }}">
                            <td>
                                <span class="ip-badge">{{ item.ip }}</span>
                            </td>
                            <td class="duration" style="color: var(--text-secondary);">
                                {{ item.duration }}
                            </td>
                            <td>
                                <span class="reason {% if 'open-appsec' in item.reason %}open-appsec{% endif %}">
                                    <i></i> {{ item.reason }}
                                </span>
                            </td>
                            <td>
                                <button class="btn-unban" onclick="unbanIp('{{ item.ip }}')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
                                    Unban
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr id="emptyRow">
                            <td colspan="4">
                                <div class="empty-state">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <p>No active CrowdSec bans found.</p>
                                    <p style="font-size: 0.85rem; margin-top: 0.5rem; opacity: 0.7;">System is clean and operational.</p>
                                </div>
                            </td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // Search functionality
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let rows = document.querySelectorAll('.item-row');
            
            rows.forEach(row => {
                let ip = row.querySelector('.ip-badge').textContent.toLowerCase();
                let reason = row.querySelector('.reason').textContent.toLowerCase();
                
                if (ip.includes(filter) || reason.includes(filter)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        // Show Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' 
                ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`
                : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                
            toast.innerHTML = `${icon} <span style="font-size: 0.9rem;">${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Unban Function
        async function unbanIp(ip) {
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<svg class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-opacity="0.3"></circle><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"></path></svg> Wait...`;
            btn.disabled = true;

            try {
                const response = await fetch('/unban', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ip: ip })
                });

                const data = await response.json();

                if (data.success) {
                    showToast(data.message, 'success');
                    // Remove the row
                    const rowId = `row-${ip.replace(/\./g, '-')}`;
                    const row = document.getElementById(rowId);
                    
                    row.style.transition = "all 0.4s ease";
                    row.style.opacity = "0";
                    row.style.transform = "translateX(-20px)";
                    
                    setTimeout(() => {
                        row.remove();
                        // Check if tbody is empty after removal (except for hidden empty row)
                        const remainingRows = document.querySelectorAll('.item-row');
                        if(remainingRows.length === 0) {
                            // Can reload or inject empty state dynamically
                            location.reload();
                        }
                    }, 400);
                } else {
                    showToast(`Error: ${data.error}`, 'error');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            } catch (error) {
                showToast(`Network error occurred`, 'error');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }
        
        // Dynamic styles for the spinner
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
